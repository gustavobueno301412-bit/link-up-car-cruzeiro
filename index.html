<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUpCar - Motorista</title>
    <style>
        /* MANTENDO SUA ESTÉTICA EXATAMENTE COMO ESTÁ */
        body { margin: 0; padding: 20px; background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .status-card {
            background: #1a1a1a; padding: 30px; border-radius: 20px;
            border: 2px solid #FF8C00; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-toggle {
            width: 100%; padding: 20px; border-radius: 50px; border: none;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
            transition: 0.3s;
        }
        .online { background: #25D366; color: white; box-shadow: 0 0 20px #25D366; }
        .offline { background: #ff4444; color: white; }
        .info { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div class="status-card">
        <h2 id="msg-status">VOCÊ ESTÁ OFFLINE</h2>
        <p>Ative para começar a receber corridas em Cruzeiro</p>
        <button id="btn-status" class="btn-toggle offline" onclick="toggleStatus()">FICAR ONLINE 🟢</button>
        <div class="info">
            ID do Motorista: <b id="display-id">---</b><br>
            Último sinal: <span id="time">---</span>
        </div>
    </div>

<script>
    // URL DA SUA API (MANTIDA)
    const URL_API = "https://script.google.com/macros/s/AKfycbxgrfsKqSC18HTvnfZL1NaEnZI_tZszhVJrBj13GNSyh22C4zLFU2JPVtzRVv3N-6Ql/exec";
   
    // Mude aqui para o seu ID da planilha (ex: 1 para Gustavo)
    const MOTORISTA_ID = 1;
    document.getElementById('display-id').innerText = MOTORISTA_ID;

    let isOnline = false;
    let watchID = null;
    let userLat, userLog;

    // 1. FUNÇÃO PARA ATUALIZAR STATUS E POSIÇÃO (ERRO 3 E 5)
    async function enviarSinal() {
        if (!isOnline || !userLat) return;

        const payload = {
            tipo: "STATUS_MOTORISTA",
            id: MOTORISTA_ID,
            status_rua: "ativo",
            lat: userLat,
            log: userLog
        };

        try {
            await fetch(URL_API, {
                method: "POST",
                mode: "no-cors", // Necessário para Google Apps Script
                body: JSON.stringify(payload)
            });
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            console.log("Sinal enviado:", userLat, userLog);
        } catch (e) {
            console.error("Erro ao enviar sinal");
        }
    }

    function toggleStatus() {
        const btn = document.getElementById('btn-status');
        const msg = document.getElementById('msg-status');

        if (!isOnline) {
            // FICAR ONLINE
            isOnline = true;
            btn.innerText = "FICAR OFFLINE 🔴";
            btn.className = "btn-toggle online";
            msg.innerText = "VOCÊ ESTÁ ONLINE";
            msg.style.color = "#25D366";
           
            // Inicia o rastreio do GPS
            startTracking();
        } else {
            // FICAR OFFLINE
            isOnline = false;
            btn.innerText = "FICAR ONLINE 🟢";
            btn.className = "btn-toggle offline";
            msg.innerText = "VOCÊ ESTÁ OFFLINE";
            msg.style.color = "#ff4444";
           
            stopTracking();
            enviarSinalInativo();
        }
    }

    function startTracking() {
        if ("geolocation" in navigator) {
            watchID = navigator.geolocation.watchPosition((pos) => {
                userLat = pos.coords.latitude;
                userLog = pos.coords.longitude;
            }, (err) => {
                alert("Ative o GPS para trabalhar!");
            }, { enableHighAccuracy: true });
        }
    }

    function stopTracking() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
    }

    // Sinal para sair do mapa quando desligar
    async function enviarSinalInativo() {
        const payload = {
            tipo: "STATUS_MOTORISTA",
            id: MOTORISTA_ID,
            status_rua: "inativo",
            lat: 0,
            log: 0
        };
        fetch(URL_API, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    // LOOP DE "ONLINE SEMPRE" (ERRO 5)
    setInterval(enviarSinal, 5000); // Envia sinal a cada 5 segundos
</script>
</body>
</html>
