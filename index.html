<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUpCar - Motorista</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid #FF8C00; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .online { background: #25D366; color: white; box-shadow: 0 0 15px #25D366; }
        .offline { background: #ff4444; color: white; }
        input, textarea { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        label { display: block; text-align: left; margin-left: 5%; color: #FF8C00; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <label>DIGITE SEU ID DA PLANILHA:</label>
        <input type="number" id="motorista_id" placeholder="Ex: 1" onchange="salvarID()">
       
        <h2 id="msg-status" style="margin-top: 20px;">VOCÊ ESTÁ OFFLINE</h2>
        <button id="btn-status" class="btn offline" onclick="toggleStatus()">FICAR ONLINE 🟢</button>
        <p id="info-envio" style="font-size: 11px; color: #888; margin-top: 10px;">GPS aguardando...</p>
    </div>

    <div class="card">
        <h3>📝 Cadastro Novo / Suporte</h3>
        <input type="text" id="reg_nome" placeholder="Nome Completo">
        <input type="text" id="reg_carro" placeholder="Carro e Cor (Ex: Gol Branco)">
        <input type="text" id="reg_placa" placeholder="Placa">
        <textarea id="reg_detalhes" placeholder="Detalhes (Ar, 4 portas, etc)"></textarea>
        <button class="btn" style="background:#444; color:white; font-size: 14px;" onclick="enviarCadastro()">ENVIAR AO GUSTAVO ✅</button>
    </div>

<script>
    // LEMBRE-SE: Use o link da "Nova Implantação" aqui
    const URL_API = "https://script.google.com/macros/s/AKfycbxXQWm-M2KsGtBqkiS0wr2G2pt776ynIWCsbBlmlEX8XNsqFQkubdP5lW244XYHL56W/exec";
   
    let isOnline = false;
    let watchID = null;
    let lastLat = 0, lastLog = 0;

    window.onload = function() {
        const idSalvo = localStorage.getItem('linkup_id');
        if(idSalvo) document.getElementById('motorista_id').value = idSalvo;
    }

    function salvarID() {
        localStorage.setItem('linkup_id', document.getElementById('motorista_id').value);
    }

    function toggleStatus() {
        const id = document.getElementById('motorista_id').value;
        if(!id) return alert("Digite seu ID antes de começar!");

        isOnline = !isOnline;
        const btn = document.getElementById('btn-status');
        const msg = document.getElementById('msg-status');
       
        if(isOnline) {
            btn.className = "btn online"; btn.innerText = "FICAR OFFLINE 🔴";
            msg.innerText = "VOCÊ ESTÁ ONLINE"; msg.style.color = "#25D366";
            iniciarGPS();
        } else {
            btn.className = "btn offline"; btn.innerText = "FICAR ONLINE 🟢";
            msg.innerText = "VOCÊ ESTÁ OFFLINE"; msg.style.color = "#ff4444";
            pararGPS();
        }
    }

    function iniciarGPS() {
        if ("geolocation" in navigator) {
            watchID = navigator.geolocation.watchPosition(pos => {
                let lat = pos.coords.latitude;
                let log = pos.coords.longitude;
                if (Math.abs(lat - lastLat) > 0.0001 || Math.abs(log - lastLog) > 0.0001) {
                    enviarDados(lat, log, "ativo");
                    lastLat = lat; lastLog = log;
                }
            }, null, { enableHighAccuracy: true });
        }
    }

    function pararGPS() {
        if(watchID) navigator.geolocation.clearWatch(watchID);
        enviarDados(0, 0, "inativo");
        document.getElementById('info-envio').innerText = "Sinal desligado.";
    }

    async function enviarDados(lat, log, status) {
        const id = document.getElementById('motorista_id').value;
        const payload = { tipo: "STATUS_MOTORISTA", id: id, status_rua: status, lat: lat, log: log };
        try {
            const response = await fetch(URL_API, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const texto = await response.text();

            if (texto === "BLOQUEADO") {
                alert("⚠️ ACESSO NEGADO: Verifique seu pagamento com o Gustavo.");
                if(isOnline) toggleStatus();
                return;
            }
           
            document.getElementById('info-envio').innerText = "Localização enviada: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('info-envio').innerText = "Enviando...";
        }
    }

    function enviarCadastro() {
        const nome = document.getElementById('reg_nome').value;
        const carro = document.getElementById('reg_carro').value;
        const placa = document.getElementById('reg_placa').value;
        const det = document.getElementById('reg_detalhes').value;
        const msg = `*LINKUPCAR: NOVO CADASTRO*%0A👤 Nome: ${nome}%0A🚗 Carro: ${carro}%0A📟 Placa: ${placa}%0A📝 Detalhes: ${det}%0A%0A_Favor ativar meu ID e conferir documentos em anexo._`;
        window.open(`https://wa.me/5512992448264?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
